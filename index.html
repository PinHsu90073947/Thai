<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>🇹🇭 芭達雅潑水節 Chill 遊指南 💦 (最新版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .chart-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            height: 350px;
            max-height: 400px;
        }
        @media (max-width: 640px) {
            .chart-container { height: 280px; }
        }
        .timeline-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background-color: #0ea5e9; 
            border: 3px solid #e0f2fe;
            position: absolute;
            left: -7.5px;
            top: 4px;
        }
        .timeline-line {
            border-left: 2px solid #cbd5e1; 
            margin-left: 8px;
            padding-left: 1.5rem;
            padding-bottom: 2rem;
            position: relative;
        }
    </style>
    
    </head>
<body class="text-slate-800 antialiased selection:bg-sky-200 pb-20">

    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-200 shadow-sm">
        <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="font-black text-xl text-sky-600 tracking-wide">🇹🇭 Pattaya 2026</div>
            <div class="text-xs font-bold text-slate-600 bg-slate-100 px-3 py-1.5 rounded-full border border-slate-200">最新版行程</div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-6 space-y-10">

        <section class="text-center space-y-4 pt-2">
            <h1 class="text-4xl md:text-5xl font-black text-slate-800 leading-tight">
                芭達雅潑水節 <br/><span class="text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-teal-400">五天四夜 Chill 遊指南</span>
            </h1>
            <div class="bg-amber-50 border border-amber-200 rounded-xl p-4 mt-4 inline-block text-left shadow-sm">
                <p class="font-bold text-amber-800 mb-1">🌟 本團最高指導原則</p>
                <p class="text-amber-900 text-sm font-medium">大家出遊請自由自在，不用太客氣，想去哪就去哪！</p>
            </div>
        </section>

        <section id="checklist-section" class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
            <div class="mb-5">
                <h2 class="text-2xl font-black flex items-center gap-2">🎒 行前與生存必備 <span class="text-xs font-normal text-slate-500 bg-slate-100 px-2 py-1 rounded">點擊打卡</span></h2>
                <p class="text-slate-500 text-sm mt-1">出發前請確認完成以下準備。泰國交通必備 App 也請先載好！</p>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3" id="checklist-container">
            </div>
        </section>

        <section id="chart-section" class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
            <div class="mb-4 text-center">
                <h2 class="text-2xl font-black mb-1">📊 每日行程 Vibe 預測</h2>
                <p class="text-slate-500 text-sm">行程排滿滿，哪天要保留體力一目瞭然！</p>
            </div>
            <div class="chart-container">
                <canvas id="vibeChart"></canvas>
            </div>
        </section>

        <section id="itinerary-section">
            <div class="mb-4">
                <h2 class="text-2xl font-black">📅 每日行程總覽</h2>
                <p class="text-slate-500 text-sm mt-1">點擊日期切換，附帶導航連結與花費預估。</p>
            </div>

            <div class="flex overflow-x-auto hide-scrollbar gap-2 border-b-2 border-slate-100 pb-3 mb-6" id="day-tabs">
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 md:p-8">
                <div id="timeline-header" class="mb-8 border-b border-slate-100 pb-4">
                    <h3 class="text-2xl font-black text-sky-600" id="current-day-title"></h3>
                    <p class="text-slate-500 font-medium mt-1" id="current-day-desc"></p>
                </div>
                <div id="timeline-container" class="ml-2">
                </div>
            </div>
        </section>

        <section id="spots-section">
            <div class="mb-5">
                <h2 class="text-2xl font-black">🗺️ 備用行程與美食（Free Style）</h2>
                <p class="text-slate-500 text-sm mt-1">想出門走走或肚子餓？從這邊挑選，隨時出發！</p>
            </div>

            <div class="flex flex-wrap gap-2 mb-5" id="spot-filters">
                <button class="filter-btn px-4 py-2 rounded-xl text-sm font-bold transition-all bg-slate-800 text-white shadow-sm" data-filter="all">全部</button>
                <button class="filter-btn px-4 py-2 rounded-xl text-sm font-bold transition-all bg-white text-slate-600 border border-slate-200 hover:bg-slate-50" data-filter="activity">🏝️ 體驗/活動</button>
                <button class="filter-btn px-4 py-2 rounded-xl text-sm font-bold transition-all bg-white text-slate-600 border border-slate-200 hover:bg-slate-50" data-filter="food">🍜 吃吃喝喝</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="spots-grid">
            </div>
        </section>

    </main>

    <script>
        const checklistData = [
            { id: 'c_cash', icon: '💰', title: '兩萬台幣等值現金', desc: '海關可能會抽查財力，務必準備。' },
            { id: 'c_card', icon: '📄', title: '線上入境卡', desc: '出發前兩天填寫完畢。', link: 'https://tdac.immigration.go.th/arrival-card/#/home', linkText: '👉 點此填寫' },
            { id: 'c_gear', icon: '🎒', title: '戰鬥裝備', desc: '防水包、手機防水套、墨鏡、帽子、防曬用品。' },
            { id: 'c_bolt', icon: '🚕', title: '下載 Bolt App (叫車)', desc: '芭達雅最好叫！機車11km約฿33，汽車5km約฿100。' },
            { id: 'c_grab', icon: '🛵', title: '下載 Grab App (叫外送)', desc: '雖然也能叫車，但在芭達雅主要用來叫食物。' }
        ];

        const itineraryData = [
            {
                id: 1, date: '4/16 (四)', title: 'Day 1', subtitle: '入境安頓與潑水開戰',
                budget: '預估開銷：車費 ฿400 / 晚餐 ฿400 / 雜支 ฿300',
                events: [
                    { time: '08:30', title: '📍 桃園機場二航集合', desc: '準備出發！' },
                    { time: '13:05', title: '🛬 抵達曼谷機場', desc: '' },
                    { time: '14:30', title: '🛂 通關入境', desc: '預期人潮眾多，請耐心等候。' },
                    { time: '15:00', title: '🚐 前往芭達雅', desc: '搭車前往芭達雅。' },
                    { time: '17:00', title: '🏡 入住 Villa & 換錢', desc: '安頓後，可派代表去 Terminal 21 或 Big C 換泰銖（先換兩萬，大家各帶兩千在身上）。' },
                    { time: '晚餐', title: '🍲 泰式火鍋/泰國蝦吃到飽', desc: '一個人大概 400 泰銖。', link: 'https://maps.app.goo.gl/ZicXtdspCRDscCoZ9' },
                    { time: '夜晚', title: '🌊 海灘街潑水節狂歡', desc: '從 Terminal 21 走到 Walking Street 入口，準備濕身！', links: [{name: 'Terminal 21', url: 'https://maps.app.goo.gl/Tpe3zqUXw9zUeFoA9'}, {name: 'Walking Street', url: 'https://maps.app.goo.gl/ZS2A9mxanLhUoMi99'}] },
                    { time: '深夜', title: '🍻 買啤酒、麻回住宿', desc: '回 Villa 繼續桑。' }
                ]
            },
            {
                id: 2, date: '4/17 (五)', title: 'Day 2', subtitle: '動物農場、土嗨大挑戰',
                events: [
                    { time: '中午', title: '🍽️ 隨性午餐', desc: '交給 Timmy 大廚下廚，或是叫 Grab 外送。' },
                    { time: '下午', title: '🐊 看鱷魚、摸長頸鹿/大象', desc: '最好 15:00 前到，門票約 ฿320。', link: 'https://maps.app.goo.gl/o57u4dRxN3NPrvw19', label: '路線 A' },
                    { time: '下午', title: '🔫 或者：打靶體驗', desc: '真槍實彈，花費至少破千元。', link: 'https://maps.app.goo.gl/7xrgWhHn2hCKJCgX6', label: '路線 B' },
                    { time: '晚餐', title: '🐟 鯉魚主題餐廳', desc: '有鯉魚會在你旁邊游泳的特色餐廳！結束後回住宿 QK。', link: 'https://maps.app.goo.gl/1MNYkRoUfmnK1qSJ8' },
                    { time: '深夜', title: '🪩 Area 39 (土嗨吧)', desc: '體驗最道地的泰國土嗨文化。', link: 'https://maps.app.goo.gl/Jw3WWRZUpwnwWLTQA' }
                ]
            },
            {
                id: 3, date: '4/18 (六)', title: 'Day 3', subtitle: '海景、市集與夜生活',
                events: [
                    { time: '午餐', title: '🌅 The Sky Gallery', desc: '絕美海景網美餐廳。', link: 'https://maps.app.goo.gl/5d8nu8FkGwPgEyWr7' },
                    { time: '下午', title: '👀 眺望芭達雅海灘', desc: '看風景拍美照。', link: 'https://maps.app.goo.gl/1PSDT6jn7QjBJRbw7' },
                    { time: '下午', title: '🛶 水上市集', desc: '體驗傳統水上市場風情。', link: 'https://maps.app.goo.gl/kSia3Rx7LkXGJowx6' },
                    { time: '傍晚', title: '🐯 老虎摸摸', desc: '近距離接觸老虎。', link: 'https://maps.app.goo.gl/6PpVXWJMqmiq23M77' },
                    { time: '晚上', title: '💆‍♂️ 泰式馬殺雞', desc: '舒緩一整天的疲勞。', link: 'https://maps.app.goo.gl/xT5bJrvvu1Wa6S6F9' },
                    { time: '深夜', title: '🎵 The Stone House & Midnight Club', desc: '聽歌喝酒，接著體驗芭達雅知名夜店！', links: [{name: 'The Stone House', url: 'https://maps.app.goo.gl/QD4UwCPJvznVM4Ym9'}, {name: 'Midnight Club', url: 'https://maps.app.goo.gl/UwnuYrpkFsCCDqgA7'}] }
                ]
            },
            {
                id: 4, date: '4/19 (日)', title: 'Day 4', subtitle: '森林系餐廳與逛街',
                events: [
                    { time: '白天', title: '🌳 The Forest by The Sky', desc: '森林系絕美餐廳。', link: 'https://maps.app.goo.gl/aPs9DVNo2ee7YHVeA' },
                    { time: '下午', title: '🛍️ Terminal 21', desc: '吃東西加購物，旁邊還有小市集可以逛。', link: 'https://maps.app.goo.gl/Tpe3zqUXw9zUeFoA9' },
                    { time: '晚上', title: '🍢 Thepprasit 夜市 (市集)', desc: '芭達雅週末必逛夜市！', link: 'https://maps.app.goo.gl/eHPjicfpTpvMHm1B8' }
                ]
            },
            {
                id: 5, date: '4/20 (一)', title: 'Day 5', subtitle: '最後衝刺與賦歸',
                events: [
                    { time: '下午', title: '🧳 退房 & 寄放行李', desc: '下午退房後，行李可以放我女友家 (沒意外的話 🤣)。' },
                    { time: '午/晚餐', title: '🍲 火鍋吃到飽', desc: '離開前的豐盛大餐。', link: 'https://maps.app.goo.gl/v3sz3vafn18BFfKt6' },
                    { time: '21:00', title: '🚐 前往機場', desc: '從芭達雅搭車前往機場準備回台，結束完美旅程！' }
                ]
            }
        ];

        const spotsData = [
            { category: 'activity', icon: '🏝️', title: '小珊瑚島一日遊', desc: '搭船去小島租機車玩水。', link: 'https://maps.app.goo.gl/G3KwiRnmDSxrR3ta7' },
            { category: 'activity', icon: '🔞', title: '99 Show Pattaya', desc: '芭達雅經典成人秀，門票 1000 初。', link: 'https://maps.app.goo.gl/mqDk1V4HRHks3kFS7' },
            { category: 'food', icon: '🍜', title: '在地美食推薦', desc: '推薦吃「船麵」與「母病 (Moo Ping 烤豬肉串)」，路邊看到就買！', link: null }
        ];

        let currentDayId = 1;
        let currentFilter = 'all';
        let checklistState = JSON.parse(localStorage.getItem('pattayaChecklistV3')) || {};

        function renderChecklist() {
            const container = document.getElementById('checklist-container');
            container.innerHTML = '';
            checklistData.forEach(item => {
                const isChecked = checklistState[item.id] || false;
                const card = document.createElement('div');
                card.className = `p-4 rounded-xl border-2 transition-all cursor-pointer flex items-start gap-3 ${isChecked ? 'bg-slate-50 border-slate-200 opacity-60' : 'bg-white border-sky-100 hover:border-sky-300'}`;
                
                card.onclick = (e) => {
                    if(e.target.tagName.toLowerCase() === 'a') return;
                    checklistState[item.id] = !checklistState[item.id];
                    localStorage.setItem('pattayaChecklistV3', JSON.stringify(checklistState));
                    renderChecklist();
                };

                const checkUI = isChecked 
                    ? `<div class="w-6 h-6 rounded-full bg-teal-500 flex items-center justify-center flex-shrink-0 mt-0.5"><span class="text-white text-xs">✓</span></div>`
                    : `<div class="w-6 h-6 rounded-full border-2 border-slate-300 flex-shrink-0 mt-0.5"></div>`;

                let linkHtml = item.link ? `<a href="${item.link}" target="_blank" class="mt-2 inline-block text-xs font-bold text-sky-600 hover:text-sky-800 bg-sky-50 px-2 py-1 rounded" onclick="event.stopPropagation();">${item.linkText}</a>` : '';

                card.innerHTML = `
                    ${checkUI}
                    <div>
                        <h3 class="font-bold text-slate-800 ${isChecked ? 'line-through text-slate-500' : ''}">${item.icon} ${item.title}</h3>
                        <p class="text-xs text-slate-500 mt-1 leading-relaxed">${item.desc}</p>
                        ${linkHtml}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function renderTabs() {
            const container = document.getElementById('day-tabs');
            container.innerHTML = '';
            itineraryData.forEach(day => {
                const isSelected = day.id === currentDayId;
                const btn = document.createElement('button');
                btn.className = `flex-shrink-0 px-5 py-3 rounded-xl text-sm transition-all border-2 ${isSelected ? 'bg-sky-600 text-white border-sky-600 shadow-md font-black' : 'bg-white text-slate-600 border-slate-100 hover:border-sky-200 font-bold'}`;
                btn.innerHTML = `<div>${day.title}</div><div class="text-xs ${isSelected?'font-medium opacity-90':'font-normal opacity-70'}">${day.date}</div>`;
                btn.onclick = () => {
                    currentDayId = day.id;
                    renderTabs();
                    renderTimeline();
                };
                container.appendChild(btn);
            });
        }

        function renderTimeline() {
            const dayData = itineraryData.find(d => d.id === currentDayId);
            
            document.getElementById('current-day-title').innerText = `${dayData.title}：${dayData.date}`;
            
            let descHtml = dayData.subtitle;
            if (dayData.budget) {
                descHtml += `<div class="mt-2 inline-block bg-amber-50 text-amber-700 text-xs font-bold px-3 py-1.5 rounded-lg border border-amber-200">💰 ${dayData.budget}</div>`;
            }
            document.getElementById('current-day-desc').innerHTML = descHtml;

            const container = document.getElementById('timeline-container');
            container.innerHTML = '';

            dayData.events.forEach((event, index) => {
                const isLast = index === dayData.events.length - 1;
                const item = document.createElement('div');
                item.className = `timeline-line ${isLast ? 'border-transparent' : ''}`;
                
                let linkBtns = '';
                if (event.link) {
                    linkBtns = `<a href="${event.link}" target="_blank" class="mt-3 inline-block text-xs font-bold text-sky-600 bg-sky-50 hover:bg-sky-100 border border-sky-100 px-3 py-1.5 rounded-lg transition-colors">📍 Google Maps</a>`;
                } else if (event.links) {
                    linkBtns = '<div class="flex gap-2 mt-3 flex-wrap">';
                    event.links.forEach(l => {
                        linkBtns += `<a href="${l.url}" target="_blank" class="text-xs font-bold text-sky-600 bg-sky-50 hover:bg-sky-100 border border-sky-100 px-3 py-1.5 rounded-lg transition-colors">📍 ${l.name}</a>`;
                    });
                    linkBtns += '</div>';
                }

                let labelHtml = event.label ? `<span class="ml-2 text-[10px] font-black tracking-wider text-teal-600 bg-teal-50 border border-teal-200 px-2 py-0.5 rounded uppercase">${event.label}</span>` : '';

                item.innerHTML = `
                    <div class="timeline-dot"></div>
                    <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 hover:border-slate-300 transition-colors">
                        <div class="flex items-center mb-1">
                            <span class="text-xs font-black text-sky-700 bg-sky-100 px-2 py-1 rounded">${event.time}</span>
                            ${labelHtml}
                        </div>
                        <h4 class="font-bold text-slate-800 text-lg mt-1">${event.title}</h4>
                        ${event.desc ? `<p class="text-slate-600 text-sm mt-1.5 leading-relaxed">${event.desc}</p>` : ''}
                        ${linkBtns}
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function renderSpots() {
            const container = document.getElementById('spots-grid');
            container.innerHTML = '';

            const filteredSpots = currentFilter === 'all' ? spotsData : spotsData.filter(s => s.category === currentFilter);

            filteredSpots.forEach(spot => {
                const card = document.createElement('div');
                card.className = 'bg-white p-5 rounded-xl shadow-sm border border-slate-100 flex flex-col h-full';
                
                let badgeClass = spot.category === 'activity' ? 'bg-purple-100 text-purple-700' : 'bg-orange-100 text-orange-700';
                let badgeText = spot.category === 'activity' ? '行程' : '美食';

                let linkBtn = spot.link 
                    ? `<a href="${spot.link}" target="_blank" class="mt-4 w-full block text-center bg-slate-50 border border-slate-200 hover:bg-slate-100 text-slate-700 font-bold py-2 rounded-lg text-sm transition-colors">📍 Google Maps</a>`
                    : `<div class="mt-4 w-full block text-center bg-slate-50 text-slate-400 font-medium py-2 rounded-lg text-sm border border-dashed border-slate-200">無特定地點，隨緣相見</div>`;

                card.innerHTML = `
                    <div class="flex-grow">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-3xl">${spot.icon}</span>
                            <span class="text-xs font-bold px-2 py-1 rounded ${badgeClass}">${badgeText}</span>
                        </div>
                        <h3 class="font-bold text-lg text-slate-800">${spot.title}</h3>
                        <p class="text-sm text-slate-500 mt-2 leading-relaxed">${spot.desc}</p>
                    </div>
                    ${linkBtn}
                `;
                container.appendChild(card);
            });
        }

        function initFilterButtons() {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => {
                btn.onclick = () => {
                    buttons.forEach(b => {
                        b.classList.remove('bg-slate-800', 'text-white');
                        b.classList.add('bg-white', 'text-slate-600');
                    });
                    btn.classList.add('bg-slate-800', 'text-white');
                    btn.classList.remove('bg-white', 'text-slate-600');

                    currentFilter = btn.getAttribute('data-filter');
                    renderSpots();
                };
            });
        }

        function initChart() {
            const ctx = document.getElementById('vibeChart').getContext('2d');
            Chart.defaults.font.family = "'Noto Sans TC', sans-serif";
            
            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['Day 1 (潑水開戰)', 'Day 2 (動物/土嗨)', 'Day 3 (海景/夜店)', 'Day 4 (逛街/夜市)', 'Day 5 (賦歸)'],
                    datasets: [
                        {
                            label: '💦 戰鬥/派對指數',
                            data: [95, 85, 90, 60, 20],
                            backgroundColor: 'rgba(14, 165, 233, 0.2)',
                            borderColor: 'rgba(14, 165, 233, 1)',
                            pointBackgroundColor: 'rgba(14, 165, 233, 1)',
                            borderWidth: 2,
                            fill: true
                        },
                        {
                            label: '🛋️ Chill/觀光指數',
                            data: [20, 60, 80, 95, 80],
                            backgroundColor: 'rgba(20, 184, 166, 0.2)',
                            borderColor: 'rgba(20, 184, 166, 1)',
                            pointBackgroundColor: 'rgba(20, 184, 166, 1)',
                            borderWidth: 2,
                            fill: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(226, 232, 240, 1)' },
                            grid: { color: 'rgba(226, 232, 240, 1)' },
                            pointLabels: { font: { size: 11, weight: 'bold' }, color: '#64748b' },
                            ticks: { display: false, min: 0, max: 100 }
                        }
                    },
                    plugins: {
                        legend: { position: 'top', labels: { usePointStyle: true, padding: 15, font: {weight: 'bold'} } },
                        tooltip: { backgroundColor: 'rgba(15, 23, 42, 0.9)', padding: 10, cornerRadius: 8 }
                    }
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderChecklist();
            renderTabs();
            renderTimeline();
            renderSpots();
            initFilterButtons();
            initChart();
        });
    </script>
</body>
</html>
