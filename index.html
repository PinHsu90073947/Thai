                subtitle: { zh: '森林系餐廳與逛街', th: 'คาเฟ่ป่า & ช้อปปิ้ง' },
                events: [
                    { time: 'Day', title: { zh: '🌳 The Forest by The Sky', th: '🌳 The Forest by The Sky' }, desc: { zh: '森林系絕美餐廳。', th: 'ร้านอาหารสไตล์ป่า สวยมาก' }, link: 'https://maps.app.goo.gl/aPs9DVNo2ee7YHVeA' },
                    { time: 'Afternoon', title: { zh: '🛍️ Terminal 21', th: '🛍️ Terminal 21' }, desc: { zh: '吃東西加購物，旁邊還有小市集可以逛。', th: 'กินข้าว ช้อปปิ้ง มีตลาดนัดเล็กๆ ข้างๆ ด้วย' }, link: 'https://maps.app.goo.gl/Tpe3zqUXw9zUeFoA9' },
                    { time: 'Night', title: { zh: '🍢 Thepprasit 夜市', th: '🍢 ตลาดเทพประสิทธิ์' }, desc: { zh: '芭達雅週末必逛夜市！', th: 'ตลาดนัดสุดสัปดาห์พัทยาที่ต้องไป!' }, link: 'https://maps.app.goo.gl/eHPjicfpTpvMHm1B8' }
                ]
            },
            {
                id: 5, date: { zh: '4/20 (一)', th: '20 เม.ย. (จ.)' }, 
                title: 'Day 5', 
                subtitle: { zh: '最後衝刺與賦歸', th: 'วันสุดท้าย & เดินทางกลับ' },
                events: [
                    { time: 'Afternoon', title: { zh: '🧳 退房 & 寄放行李', th: '🧳 เช็คเอาท์ & ฝากกระเป๋า' }, desc: { zh: '下午退房後，行李可以放我女友家 (沒意外的話)。', th: 'เช็คเอาท์ตอนบ่าย เอากระเป๋าไปฝากบ้านแฟนผม' } },
                    { time: 'Dinner', title: { zh: '🍲 火鍋吃到飽', th: '🍲 ชาบูบุฟเฟ่ต์' }, desc: { zh: '離開前的豐盛大餐。', th: 'มื้อใหญ่ก่อนกลับ' }, link: 'https://maps.app.goo.gl/v3sz3vafn18BFfKt6' },
                    { time: '21:00', title: { zh: '🚐 前往機場', th: '🚐 เดินทางไปสนามบิน' }, desc: { zh: '從芭達雅搭車前往機場準備回台，結束完美旅程！', th: 'นั่งรถจากพัทยาไปสนามบินเพื่อบินกลับไต้หวัน จบทริปอย่างสมบูรณ์!' } }
                ]
            }
        ];

        const spotsData = [
            { category: 'activity', icon: '🏝️', 
              title: { zh: '小珊瑚島一日遊', th: 'เกาะล้าน 1 วัน' }, 
              desc: { zh: '搭船去小島租機車玩水。', th: 'นั่งเรือไปเกาะ เช่ามอเตอร์ไซค์เล่นน้ำ' }, link: 'https://maps.app.goo.gl/G3KwiRnmDSxrR3ta7' },
            { category: 'activity', icon: '🔞', 
              title: { zh: '99 Show Pattaya', th: '99 Show Pattaya' }, 
              desc: { zh: '芭達雅經典成人秀，門票 1000 初。', th: 'โชว์ผู้ใหญ่สุดคลาสสิก ค่าเข้าพันนิดๆ' }, link: 'https://maps.app.goo.gl/mqDk1V4HRHks3kFS7' },
            { category: 'food', icon: '🍜', 
              title: { zh: '在地美食推薦', th: 'แนะนำของกินโลคอล' }, 
              desc: { zh: '推薦吃「船麵」與「母病 (Moo Ping 烤豬肉串)」，路邊看到就買！', th: 'แนะนำกิน "ก๋วยเตี๋ยวเรือ" กับ "หมูปิ้ง" เจอข้างทางเมื่อไหร่ซื้อเลย!' }, link: null }
        ];

        // --- App State ---
        let currentLang = localStorage.getItem('pattayaLang') || 'zh';
        let currentDayId = 1;
        let currentFilter = 'all';
        let checklistState = JSON.parse(localStorage.getItem('pattayaChecklistV4')) || {};
        let myChart = null;

        // --- Language Switcher Logic ---
        function toggleLang() {
            currentLang = currentLang === 'zh' ? 'th' : 'zh';
            localStorage.setItem('pattayaLang', currentLang);
            updateAllUI();
        }

        function updateStaticText() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (uiTranslations[currentLang][key]) {
                    el.innerText = uiTranslations[currentLang][key];
                }
            });
        }

        // --- Render Functions ---
        function renderChecklist() {
            const container = document.getElementById('checklist-container');
            container.innerHTML = '';
            const linkText = uiTranslations[currentLang].fillForm;

            checklistData.forEach(item => {
                const isChecked = checklistState[item.id] || false;
                const card = document.createElement('div');
                card.className = `p-4 rounded-xl border-2 transition-all cursor-pointer flex items-start gap-3 ${isChecked ? 'bg-slate-50 border-slate-200 opacity-60' : 'bg-white border-sky-100 hover:border-sky-300'}`;
                
                card.onclick = (e) => {
                    if(e.target.tagName.toLowerCase() === 'a') return;
                    checklistState[item.id] = !checklistState[item.id];
                    localStorage.setItem('pattayaChecklistV4', JSON.stringify(checklistState));
                    renderChecklist();
                };

                const checkUI = isChecked 
                    ? `<div class="w-6 h-6 rounded-full bg-teal-500 flex items-center justify-center flex-shrink-0 mt-0.5"><span class="text-white text-xs">✓</span></div>`
                    : `<div class="w-6 h-6 rounded-full border-2 border-slate-300 flex-shrink-0 mt-0.5"></div>`;

                let linkHtml = item.link ? `<a href="${item.link}" target="_blank" class="mt-2 inline-block text-xs font-bold text-sky-600 hover:text-sky-800 bg-sky-50 px-2 py-1 rounded" onclick="event.stopPropagation();">${linkText}</a>` : '';

                card.innerHTML = `
                    ${checkUI}
                    <div>
                        <h3 class="font-bold text-slate-800 ${isChecked ? 'line-through text-slate-500' : ''}">${item.icon} ${item.title[currentLang]}</h3>
                        <p class="text-xs text-slate-500 mt-1 leading-relaxed">${item.desc[currentLang]}</p>
                        ${linkHtml}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function renderTabs() {
            const container = document.getElementById('day-tabs');
            container.innerHTML = '';
            itineraryData.forEach(day => {
                const isSelected = day.id === currentDayId;
                const btn = document.createElement('button');
                btn.className = `flex-shrink-0 px-5 py-3 rounded-xl text-sm transition-all border-2 ${isSelected ? 'bg-sky-600 text-white border-sky-600 shadow-md font-black' : 'bg-white text-slate-600 border-slate-100 hover:border-sky-200 font-bold'}`;
                btn.innerHTML = `<div>${day.title}</div><div class="text-xs ${isSelected?'font-medium opacity-90':'font-normal opacity-70'}">${day.date[currentLang]}</div>`;
                btn.onclick = () => {
                    currentDayId = day.id;
                    renderTabs();
                    renderTimeline();
                };
                container.appendChild(btn);
            });
        }

        function renderTimeline() {
            const dayData = itineraryData.find(d => d.id === currentDayId);
            const mapBtnText = uiTranslations[currentLang].mapBtn;
            
            document.getElementById('current-day-title').innerText = `${dayData.title}：${dayData.date[currentLang]}`;
            
            let descHtml = dayData.subtitle[currentLang];
            if (dayData.budget) {
                descHtml += `<div class="mt-2 inline-block bg-amber-50 text-amber-700 text-xs font-bold px-3 py-1.5 rounded-lg border border-amber-200">💰 ${dayData.budget[currentLang]}</div>`;
            }
            document.getElementById('current-day-desc').innerHTML = descHtml;

            const container = document.getElementById('timeline-container');
            container.innerHTML = '';

            dayData.events.forEach((event, index) => {
                const isLast = index === dayData.events.length - 1;
                const item = document.createElement('div');
                item.className = `timeline-line ${isLast ? 'border-transparent' : ''}`;
                
                let linkBtns = '';
                if (event.link) {
                    linkBtns = `<a href="${event.link}" target="_blank" class="mt-3 inline-block text-xs font-bold text-sky-600 bg-sky-50 hover:bg-sky-100 border border-sky-100 px-3 py-1.5 rounded-lg transition-colors">${mapBtnText}</a>`;
                } else if (event.links) {
                    linkBtns = '<div class="flex gap-2 mt-3 flex-wrap">';
                    event.links.forEach(l => {
                        linkBtns += `<a href="${l.url}" target="_blank" class="text-xs font-bold text-sky-600 bg-sky-50 hover:bg-sky-100 border border-sky-100 px-3 py-1.5 rounded-lg transition-colors">📍 ${l.name}</a>`;
                    });
                    linkBtns += '</div>';
                }

                let labelHtml = event.label ? `<span class="ml-2 text-[10px] font-black tracking-wider text-teal-600 bg-teal-50 border border-teal-200 px-2 py-0.5 rounded uppercase">${event.label[currentLang]}</span>` : '';

                item.innerHTML = `
                    <div class="timeline-dot"></div>
                    <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 hover:border-slate-300 transition-colors">
                        <div class="flex items-center mb-1">
                            <span class="text-xs font-black text-sky-700 bg-sky-100 px-2 py-1 rounded">${event.time}</span>
                            ${labelHtml}
                        </div>
                        <h4 class="font-bold text-slate-800 text-lg mt-1">${event.title[currentLang]}</h4>
                        ${event.desc[currentLang] ? `<p class="text-slate-600 text-sm mt-1.5 leading-relaxed">${event.desc[currentLang]}</p>` : ''}
                        ${linkBtns}
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function renderSpots() {
            const container = document.getElementById('spots-grid');
            container.innerHTML = '';
            
            const mapBtnText = uiTranslations[currentLang].mapBtn;
            const noMapText = uiTranslations[currentLang].noMap;
            const labelActText = uiTranslations[currentLang].filterAct;
            const labelFoodText = uiTranslations[currentLang].filterFood;

            const filteredSpots = currentFilter === 'all' ? spotsData : spotsData.filter(s => s.category === currentFilter);

            filteredSpots.forEach(spot => {
                const card = document.createElement('div');
                card.className = 'bg-white p-5 rounded-xl shadow-sm border border-slate-100 flex flex-col h-full';
                
                let badgeClass = spot.category === 'activity' ? 'bg-purple-100 text-purple-700' : 'bg-orange-100 text-orange-700';
                let badgeText = spot.category === 'activity' ? labelActText : labelFoodText;

                let linkBtn = spot.link 
                    ? `<a href="${spot.link}" target="_blank" class="mt-4 w-full block text-center bg-slate-50 border border-slate-200 hover:bg-slate-100 text-slate-700 font-bold py-2 rounded-lg text-sm transition-colors">${mapBtnText}</a>`
                    : `<div class="mt-4 w-full block text-center bg-slate-50 text-slate-400 font-medium py-2 rounded-lg text-sm border border-dashed border-slate-200">${noMapText}</div>`;

                card.innerHTML = `
                    <div class="flex-grow">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-3xl">${spot.icon}</span>
                            <span class="text-xs font-bold px-2 py-1 rounded ${badgeClass}">${badgeText}</span>
                        </div>
                        <h3 class="font-bold text-lg text-slate-800">${spot.title[currentLang]}</h3>
                        <p class="text-sm text-slate-500 mt-2 leading-relaxed">${spot.desc[currentLang]}</p>
                    </div>
                    ${linkBtn}
                `;
                container.appendChild(card);
            });
        }

        function initFilterButtons() {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => {
                btn.onclick = () => {
                    buttons.forEach(b => {
                        b.classList.remove('bg-slate-800', 'text-white');
                        b.classList.add('bg-white', 'text-slate-600');
                    });
                    btn.classList.add('bg-slate-800', 'text-white');
                    btn.classList.remove('bg-white', 'text-slate-600');

                    currentFilter = btn.getAttribute('data-filter');
                    renderSpots();
                };
            });
        }

        function renderChart() {
            const ctx = document.getElementById('vibeChart').getContext('2d');
            Chart.defaults.font.family = "'Noto Sans TC', 'Sarabun', sans-serif";
            
            if (myChart) {
                myChart.destroy(); // Destroy previous instance to update labels properly
            }
            
            // Labels can remain mostly english/numbers, but legends need translation
            const labels = ['Day 1', 'Day 2', 'Day 3', 'Day 4', 'Day 5'];

            myChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: uiTranslations[currentLang].chartLabel1,
                            data: [95, 85, 90, 60, 20],
                            backgroundColor: 'rgba(14, 165, 233, 0.2)',
                            borderColor: 'rgba(14, 165, 233, 1)',
                            pointBackgroundColor: 'rgba(14, 165, 233, 1)',
                            borderWidth: 2,
                            fill: true
                        },
                        {
                            label: uiTranslations[currentLang].chartLabel2,
                            data: [20, 60, 80, 95, 80],
                            backgroundColor: 'rgba(20, 184, 166, 0.2)',
                            borderColor: 'rgba(20, 184, 166, 1)',
                            pointBackgroundColor: 'rgba(20, 184, 166, 1)',
                            borderWidth: 2,
                            fill: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(226, 232, 240, 1)' },
                            grid: { color: 'rgba(226, 232, 240, 1)' },
                            pointLabels: { font: { size: 12, weight: 'bold' }, color: '#64748b' },
                            ticks: { display: false, min: 0, max: 100 }
                        }
                    },
                    plugins: {
                        legend: { position: 'top', labels: { usePointStyle: true, padding: 15, font: {weight: 'bold', family: "'Noto Sans TC', 'Sarabun'"} } },
                        tooltip: { backgroundColor: 'rgba(15, 23, 42, 0.9)', padding: 10, cornerRadius: 8 }
                    }
                }
            });
        }

        function updateAllUI() {
            updateStaticText();
            renderChecklist();
            renderTabs();
            renderTimeline();
            renderSpots();
            renderChart();
        }

        // --- Init ---
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('langToggle').addEventListener('click', toggleLang);
            initFilterButtons();
            updateAllUI();
        });
    </script>
</body>
</html>
